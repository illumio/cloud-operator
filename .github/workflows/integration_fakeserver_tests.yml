name: Integration Tests with Fakeserver

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  packages: write

jobs:
  test-deploy-onboard-fakeserver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.meta.outputs.tags }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tags }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.24.0"

      - name: Install Minikube
        run: |
          curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube

      - name: Start Minikube with Cilium CNI
        run: |
          minikube start --driver=docker --cni=cilium --memory=4096

      - name: Wait for Minikube and Cilium to be ready
        run: |
          minikube kubectl -- get nodes
          echo "Waiting for Cilium pods..."
          kubectl wait --for=condition=ready pod -l k8s-app=cilium -n kube-system --timeout=300s

      - name: Install Cilium CLI and Enable Hubble
        run: |
          # Install Cilium CLI
          CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
          curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz
          sudo tar xzvfC cilium-linux-amd64.tar.gz /usr/local/bin
          rm cilium-linux-amd64.tar.gz

          # Enable Hubble with Relay
          cilium hubble enable --relay

          # Wait for Hubble Relay
          echo "Waiting for Hubble Relay..."
          kubectl wait --for=condition=ready pod -l k8s-app=hubble-relay -n kube-system --timeout=300s
          echo "Hubble Relay is ready"

      - name: Set up Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: "v3.19.0"

      - name: Package Helm chart
        run: |
          helm package cloud-operator && kubectl create ns illumio-cloud

      - name: Install Integration Test Dependencies
        run: |
          cd ./fakeserver && go mod tidy && go mod download

      - name: Install Helm chart and Deploy Operator
        env:
          ONBOARDING_CLIENT_ID: "client_id_1"
          ONBOARDING_CLIENT_SECRET: "client_secret_1"
          TLS_SKIP_VERIFY: true
          ONBOARDING_ENDPOINT: "https://192.168.49.1:50053/api/v1/k8s_cluster/onboard"
          TOKEN_ENDPOINT: "https://192.168.49.1:50053/api/v1/k8s_cluster/authenticate"
        run: |
          helm upgrade --install illumio cloud-operator-*.tgz \
          --namespace illumio-cloud \
          --create-namespace \
          --set image.repository=ghcr.io/${{ github.repository }} \
          --set image.tag=${{ steps.meta.outputs.tags }} \
          --set image.pullPolicy=Always \
          --set onboardingSecret.clientId=$ONBOARDING_CLIENT_ID \
          --set onboardingSecret.clientSecret=$ONBOARDING_CLIENT_SECRET \
          --set env.onboardingEndpoint=$ONBOARDING_ENDPOINT \
          --set env.tokenEndpoint=$TOKEN_ENDPOINT \
          --set env.tlsSkipVerify=$TLS_SKIP_VERIFY \

      - name: Generate network traffic for Cilium flows
        run: |
          # Create test pods that generate traffic
          kubectl run nginx --image=nginx --restart=Never
          kubectl wait --for=condition=ready pod/nginx --timeout=120s

          kubectl run curl-client --image=curlimages/curl --restart=Never -- sleep 300
          kubectl wait --for=condition=ready pod/curl-client --timeout=120s

          # Generate traffic
          for i in {1..5}; do
            kubectl exec curl-client -- curl -s --max-time 5 nginx || true
            sleep 2
          done
          echo "Traffic generation complete"

      - name: Run Integration Tests
        env:
          CILIUM_ENABLED: "true"
        run: |
          # Run your test against the fake server
           kubectl wait --for=condition=ready pod -l app=cloud-operator -n illumio-cloud --timeout=300s && go test -v ./fakeserver/...

      - name: Fetch Kubernetes Pod logs
        if: always()
        run: |
          echo "=== Operator logs ==="
          kubectl logs -l app=cloud-operator -n illumio-cloud || true
          echo "=== Cilium status ==="
          cilium status || true
