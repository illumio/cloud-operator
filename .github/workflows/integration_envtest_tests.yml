name: Envtest Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  envtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download Cilium CRDs
        run: make download-crds

      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.23.3
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use --print path)" >> $GITHUB_ENV

      - name: Run envtest tests
        run: make test-envtest
