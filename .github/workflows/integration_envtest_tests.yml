name: Envtest Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  envtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download Cilium CRDs
        run: make download-crds

      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.23.3
          # Single source of truth: read the pinned k8s version from the Makefile.
          ENVTEST_K8S_VERSION=$(make print-envtest-version)
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use ${ENVTEST_K8S_VERSION} --print path)" >> $GITHUB_ENV

      - name: Run envtest tests
        run: make test-envtest
