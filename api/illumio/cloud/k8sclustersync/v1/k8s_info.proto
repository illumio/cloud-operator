syntax = "proto3";

package illumio.cloud.k8sclustersync.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/illumio/cloud-operator/api/illumio/cloud/k8sclustersync/v1";

// Application-level keepalives. While gRPC already has an HTTP-level keepalive
// mechanism, we have seen deployments where the server lives behind an ingress.
// The gRPC system-level keepalive (represented by the `-`s in the diagram)
// terminates at the ingress, and thus doesn't work end-to-end. This is solved
// with an application level keepalive (represented by the `=`s in the diagram)
//
// +----------------+       +---------+          +--------+
// |                +------>+         +          +        |
// | cloud-operator +       + ingress +          + server |
// |                +======>+         +=========>+        |
// +----------------+       +---------+          +--------+
//
// Keepalives are important to us, because when the server restarts, the
// connection may be closed between the Ingress and the server - but not between
// the cloud-operator and the Ingress. Application-level keepalives will
// re-establish connections to the server faster than if we wait for reasons to
// send data over the channel
message Keepalive {}

// Metadata associated with a Kubernetes resource.
// https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.29/#objectmeta-v1-meta
message KubernetesObjectData {
  map<string, string> annotations = 1;
  google.protobuf.Timestamp creation_timestamp = 2;
  string kind = 3;
  map<string, string> labels = 4;
  string name = 5;
  // Empty for clusterwide resources which have no namespace.
  optional string namespace = 6;
  repeated KubernetesOwnerReference owner_references = 7;
  string resource_version = 8;
  string uid = 9;
  oneof kind_specific {
    KubernetesPodData pod = 100;
    KubernetesNodeData node = 101;
    KubernetesServiceData service = 102;
    KubernetesNetworkPolicyData network_policy = 103;
    KubernetesCiliumNetworkPolicyData cilium_network_policy = 104;
    KubernetesCiliumClusterwideNetworkPolicyData cilium_clusterwide_network_policy = 105;
    KubernetesCiliumCIDRGroupData cilium_cidr_group = 106;
  }
}

message KubernetesServiceData {
  // List of IP addresses associated with the Kubernetes service
  repeated string ip_addresses = 1;
  // List of service ports details
  repeated ServicePort ports = 2;
  // Type of Kubernetes service (e.g., ClusterIP, NodePort, LoadBalancer, etc.)
  string type = 3;
  // The external reference that discovery mechanisms will
  // return as an alias for this service
  optional string external_name = 4;
  // The class of the load balancer implementation this Service belongs to
  optional string load_balancer_class = 5;

  message ServicePort {
    // The port on each node on which this service is exposed
    optional uint32 node_port = 1;
    // The port that will be exposed by this service
    uint32 port = 2;
    // The IP protocol for this port, supports "TCP", "UDP", and "SCTP"
    string protocol = 3;
    // List of ports exposing the service via a load balancer
    repeated string load_balancer_ports = 4;
  }
}

// KubernetesNodeData contains information specific to a Node Object.
message KubernetesNodeData {
  // Node.spec.providerID
  string provider_id = 1;
  // List of ip addresses that are tied to Node so we can resolve them as workloads
  repeated string ip_addresses = 2;
}

// KubernetesPodData contains information specific to a Pod object.
// It currently holds the IP addresses allocated to a pod. If this field is specified, the 0th entry must match the podIP field.
// A Pod may be allocated at most 1 value for each of IPv4 and IPv6. This list is empty if no IPs have been allocated yet.
message KubernetesPodData {
  repeated string ip_addresses = 1;
}

// KubernetesNetworkPolicyData contains information specific to a NetworkPolicy object.
message KubernetesNetworkPolicyData {
  bool ingress = 1; // True if Ingress policy is enabled
  bool egress = 2; // True if Egress policy is enabled
  LabelSelector pod_selector = 3; // Pod selector for the policy
  repeated NetworkPolicyRule ingress_rules = 4; // Ingress rules for the policy
  repeated NetworkPolicyRule egress_rules = 5; // Egress rules for the policy
}

// Note: KubernetesCiliumNetworkPolicyData and KubernetesCiliumClusterwideNetworkPolicyData have
// identical structure but are kept as separate messages intentionally:
// 1. Mirrors Cilium's two distinct CRDs (CiliumNetworkPolicy vs CiliumClusterwideNetworkPolicy)
// 2. Future-proof if Cilium adds fields to one type but not the other
// 3. The kind_specific oneof field name already distinguishes which type it is
// The duplication is minimal (one repeated field each) and preserves semantic clarity.

// KubernetesCiliumNetworkPolicyData contains information specific to a CiliumNetworkPolicy object.
// CiliumNetworkPolicy is a namespaced policy that applies to pods selected by the endpoint selector.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/k8s/apis/cilium.io/v2/ccnp_types.go#L29-L54
message KubernetesCiliumNetworkPolicyData {
  // Rules from both `spec` (single) and `specs` (array) fields, unified as an array.
  repeated CiliumPolicyRule specs = 1;
}

// KubernetesCiliumClusterwideNetworkPolicyData contains information specific to a CiliumClusterwideNetworkPolicy object.
// CiliumClusterwideNetworkPolicy is a cluster-scoped policy that applies across all namespaces.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/k8s/apis/cilium.io/v2/cnp_types.go#L33-L55
message KubernetesCiliumClusterwideNetworkPolicyData {
  // Rules from both `spec` (single) and `specs` (array) fields, unified as an array.
  repeated CiliumPolicyRule specs = 1;
}

// KubernetesCiliumCIDRGroupData contains information specific to a CiliumCIDRGroup object.
// CiliumCIDRGroup is a list of external CIDRs (i.e., CIDRs selecting peers outside the clusters)
// that can be referenced as a single entity from CiliumNetworkPolicies.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/k8s/apis/cilium.io/v2/cidrgroups_types.go#L23-L32
message KubernetesCiliumCIDRGroupData {
  // Spec contains the CIDRGroup specification.
  CiliumCIDRGroup spec = 1;
}

// CiliumCIDRGroup defines the specification for a CiliumCIDRGroup.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/k8s/apis/cilium.io/v2/cidrgroups_types.go#L34-L40
message CiliumCIDRGroup {
  // ExternalCIDRs is a list of CIDRs selecting peers outside the clusters.
  repeated string external_cidrs = 1;
}

// CiliumPolicyRule represents a single rule within a Cilium policy.
// Maps to Cilium's Rule type which contains selectors, metadata, and rules.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/rule.go#L70-L151
message CiliumPolicyRule {
  // Endpoint selector selects the pods to which this spec's rules apply.
  optional LabelSelector endpoint_selector = 1;
  // Node selector selects the nodes to which this spec applies (for host policies).
  // May only be set in CiliumClusterwideNetworkPolicy resources.
  // endpoint_selector and node_selector are mutually exclusive.
  optional LabelSelector node_selector = 2;
  // Human-readable description of this spec's purpose.
  optional string description = 3;
  // Labels attached to this spec (separate from K8s metadata labels).
  map<string, string> labels = 4;
  // Controls whether this spec enables default deny for ingress/egress.
  optional CiliumPolicyDefaultDeny enable_default_deny = 5;
  // Ingress rules define allowed incoming traffic.
  repeated CiliumPolicyIngressRule ingress_rules = 6;
  // Egress rules define allowed outgoing traffic.
  repeated CiliumPolicyEgressRule egress_rules = 7;
  // IngressDeny rules explicitly deny incoming traffic.
  repeated CiliumPolicyIngressRule ingress_deny_rules = 8;
  // EgressDeny rules explicitly deny outgoing traffic.
  repeated CiliumPolicyEgressRule egress_deny_rules = 9;
}

// CiliumPolicyDefaultDeny controls default deny behavior for a spec.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/rule.go#L33-L45
message CiliumPolicyDefaultDeny {
  // If true, enables default deny for ingress traffic.
  optional bool ingress = 1;
  // If true, enables default deny for egress traffic.
  optional bool egress = 2;
}

// CiliumPolicyIngressRule defines a Cilium ingress rule.
// Used for both allow and deny rules; allow vs deny is determined by which array
// the rule belongs to (ingress_rules vs ingress_deny_rules) in CiliumPolicyRule.
// Separate from CiliumPolicyEgressRule to mirror Cilium's CRD structure and ensure
// ingress rules only have from_* fields.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/ingress.go#L133-L162
message CiliumPolicyIngressRule {
  // FromEndpoints selects source endpoints by labels.
  // Wrapped to distinguish nil (implicit wildcard when to_ports is set) from empty (selects nothing).
  optional LabelSelectorList from_endpoints = 1;
  // FromCIDR allows/denies traffic from specific CIDR ranges.
  repeated string from_cidr = 2;
  // FromCIDRSet allows/denies traffic from CIDR ranges with exceptions.
  repeated CiliumPolicyCIDRSet from_cidr_set = 3;
  // FromEntities allows/denies traffic from Cilium-defined entities (e.g., "world", "cluster", "host").
  repeated string from_entities = 4;
  // FromGroups allows/denies traffic from cloud provider security groups.
  repeated CiliumPolicyGroup from_groups = 5;
  // FromNodes selects source nodes by labels (for host policies).
  repeated LabelSelector from_nodes = 6;
  // ToPorts specifies the destination ports and protocols.
  repeated CiliumPolicyPortRule to_ports = 7;
  // ICMPs specifies ICMP type/code matching rules.
  repeated CiliumPolicyICMPRule icmps = 8;
  // Authentication specifies required authentication for allowed traffic.
  // Note: Not applicable for deny rules (field is ignored).
  optional CiliumPolicyAuthentication authentication = 9;
}

// CiliumPolicyEgressRule defines a Cilium egress rule.
// Used for both allow and deny rules; allow vs deny is determined by which array
// the rule belongs to (egress_rules vs egress_deny_rules) in CiliumPolicyRule.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/egress.go#L138-L183
message CiliumPolicyEgressRule {
  // ToEndpoints selects destination endpoints by labels.
  // Wrapped to distinguish nil (implicit wildcard when to_ports is set) from empty (selects nothing).
  optional LabelSelectorList to_endpoints = 1;
  // ToCIDR allows/denies traffic to specific CIDR ranges.
  repeated string to_cidr = 2;
  // ToCIDRSet allows/denies traffic to CIDR ranges with exceptions.
  repeated CiliumPolicyCIDRSet to_cidr_set = 3;
  // ToEntities allows/denies traffic to Cilium-defined entities (e.g., "world", "cluster", "host").
  repeated string to_entities = 4;
  // ToFQDNs allows traffic to DNS names (e.g., "*.example.com").
  // Note: Not applicable for deny rules (field is ignored).
  repeated CiliumPolicyFQDNSelector to_fqdns = 5;
  // ToServices allows/denies traffic to Kubernetes services.
  repeated CiliumPolicyService to_services = 6;
  // ToGroups allows/denies traffic to cloud provider security groups.
  repeated CiliumPolicyGroup to_groups = 7;
  // ToNodes selects destination nodes by labels (for host policies).
  repeated LabelSelector to_nodes = 8;
  // ToPorts specifies the destination ports and protocols.
  repeated CiliumPolicyPortRule to_ports = 9;
  // ICMPs specifies ICMP type/code matching rules.
  repeated CiliumPolicyICMPRule icmps = 10;
  // Authentication specifies required authentication for allowed traffic.
  // Note: Not applicable for deny rules (field is ignored).
  optional CiliumPolicyAuthentication authentication = 11;
}

// CiliumPolicyCIDRSet defines a CIDR range with optional exceptions.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/cidr.go#L26-L59
message CiliumPolicyCIDRSet {
  // cidr, cidr_group_ref, and cidr_group_selector are mutually exclusive
  // CIDR range (e.g., "10.0.0.0/8")
  optional string cidr = 1;
  // Reference to a CiliumCIDRGroup custom resource by name
  optional string cidr_group_ref = 2;
  // Selects CiliumCIDRGroups by their labels, rather than by name
  optional LabelSelector cidr_group_selector = 3;
  // Exception CIDRs to exclude from the range
  repeated string except = 4;
}

// CiliumPolicyGroup defines a cloud provider security group selector.
// In Cilium's CRD, each group has a cloud provider key (aws, azure, etc.) containing
// provider-specific fields. We model this as a oneof to match Cilium's structure.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/groups.go#L29-L31
message CiliumPolicyGroup {
  oneof cloud_provider {
    CiliumPolicyAWSGroup aws = 1;
    // Future: Add azure, gcp when needed
  }
}

// CiliumPolicyAWSGroup defines AWS-specific security group selector fields.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/groups.go#L34-L39
message CiliumPolicyAWSGroup {
  // AWS security groups tags.
  map<string, string> labels = 1;
  // Security group IDs (Cilium supports multiple per group selector)
  repeated string security_group_ids = 2;
  repeated string security_group_names = 3;
  optional string region = 4;
}

// CiliumPolicyICMPRule defines ICMP type/code matching for Cilium policies.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/icmp.go#L68-L74
message CiliumPolicyICMPRule {
  // ICMP fields for IPv4 or IPv6
  repeated CiliumPolicyICMPField fields = 1;
}

// CiliumPolicyICMPField defines a single ICMP type match.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/icmp.go#L80-L109
message CiliumPolicyICMPField {
  // IP family: "IPv4" or "IPv6"
  optional string family = 1;
  // ICMP type can be numeric (e.g., 8) or named (e.g., "EchoReply")
  oneof type {
    uint32 type_int = 2;
    string type_string = 3;
  }
}

// CiliumPolicyAuthentication defines authentication requirements for allowed traffic.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/rule.go#L13-L29
message CiliumPolicyAuthentication {
  // Authentication mode: "disabled", "required", or "test-always-fail"
  string mode = 1;
}

// CiliumPolicyFQDNSelector defines DNS-based egress rules.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/fqdn.go#L33-L66
message CiliumPolicyFQDNSelector {
  // match_name and match_pattern are mutually exclusive
  // matchName matches exact DNS names (e.g., "my-service.example.com")
  optional string match_name = 1;
  // matchPattern matches DNS names using wildcards (e.g., "*.example.com")
  optional string match_pattern = 2;
}

// CiliumPolicyService defines a Kubernetes service selector for egress rules.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/service.go#L13-L18
message CiliumPolicyService {
  // k8s_service_selector and k8s_service are mutually exclusive
  optional CiliumPolicyK8sServiceSelector k8s_service_selector = 1;
  optional CiliumPolicyK8sService k8s_service = 2;
}

// CiliumPolicyK8sServiceSelector selects services by labels.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/service.go#L27-31
message CiliumPolicyK8sServiceSelector {
  LabelSelector selector = 1;
  // Kubernetes namespace (optional, defaults to policy namespace)
  optional string namespace = 2;
}

// CiliumPolicyK8sService selects a service by name.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/service.go#L21-24
message CiliumPolicyK8sService {
  optional string service_name = 1;
  // Kubernetes namespace (optional, defaults to policy namespace)
  optional string namespace = 2;
}

// CiliumPolicyPortRule defines allowed ports and protocols for Cilium policies.
// Note that none of the L7 fields from Cilium's PortRule are included
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/l4.go#L210-L258
message CiliumPolicyPortRule {
  repeated CiliumPolicyPort ports = 1;
}

// CiliumPolicyPort defines a single port with protocol, with optional port range support.
// https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/l4.go#L42-L74
message CiliumPolicyPort {
  // Port number or named port (e.g., "80", "http")
  string port = 1;
  // End of port range (0-65535). If specified, port must be numeric.
  // Traffic to ports [port, end_port] will be matched.
  optional int32 end_port = 2;
  // Protocol for this port rule:
  // https://github.com/cilium/cilium/blob/40fafc202f3c16dfa287af9eb4dc3f3e72a120f3/pkg/policy/api/l4.go#L9-L28
  optional string protocol = 3;
}

// LabelSelector selects a k8s resource (e.g., a pod or namespace) by its labels.
message LabelSelector {
  map<string, string> match_labels = 1;
  repeated LabelSelectorRequirement match_expressions = 2;
}

// LabelSelectorList wraps repeated LabelSelector to distinguish nil from empty.
message LabelSelectorList {
  repeated LabelSelector items = 1;
}

// LabelSelectorRequirement is a selector that contains values, a key, and an operator that relates the key and values.
message LabelSelectorRequirement {
  string key = 1;
  // operator represents a key's relationship to a set of values. Valid operators are In, NotIn, Exists and DoesNotExist.
  string operator = 2;
  repeated string values = 3;
}

// IPBlock defines a particular CIDR (Ex: 10.10.10.0/24).
message IPBlock {
  string cidr = 1;
  repeated string except = 2;
}

// Peer defines a network peer as a set of IP addresses or a set of pods.
message Peer {
  oneof peer {
    IPBlock ip_block = 1;
    PeerSelector pods = 2;
  }
}

// PeerSelector selects a set of pods.
message PeerSelector {
  // Selects namespaces using cluster-scoped labels.
  // An empty selector selects all namespaces.
  optional LabelSelector namespace_selector = 1;
  // Selects pods in the selected namespaces using pod labels.
  // An empty selectors selects all pods.
  optional LabelSelector pod_selector = 2;
}

// Port defines a network port.
message Port {
  enum Protocol {
    PROTOCOL_TCP_UNSPECIFIED = 0; // Default value in Kubernetes
    PROTOCOL_UDP = 1;
    PROTOCOL_SCTP = 2;
  }

  Protocol protocol = 1;
  optional string port = 2;
  optional int32 end_port = 3;
}

// NetworkPolicyRule defines a single ingress or egress rule.
message NetworkPolicyRule {
  repeated Peer peers = 1;
  repeated Port ports = 2;
}

// Information identifying an object owning a Kubernetes resource.
// https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.29/#ownerreference-v1-meta
message KubernetesOwnerReference {
  string api_version = 1;
  bool block_owner_deletion = 2;
  bool controller = 3;
  string kind = 4;
  string name = 5;
  string uid = 6;
}

// Metadata about the client operator and Kubernetes cluster.
// Sent as the first message in each KubernetesResources RPC request stream.
message KubernetesClusterMetadata {
  // Unique ID of the client operator's Kubernetes cluster.
  // This is the UID of the cluster's kube-system namespace, which is considered globally unique.
  string uid = 1;
  // Kubernetes version of the operator's cluster.
  // https://pkg.go.dev/k8s.io/client-go/discovery#DiscoveryClient.ServerVersion
  string kubernetes_version = 2;
  // Version of the operator. This version is following the Semver 2.0.0 format, e.g. "1.2.0".
  // https://semver.org/spec/v2.0.0.html
  string operator_version = 3;
  // The network flow collection mechanism configured in the operator's cluster
  FlowCollector flow_collector = 4;
  // Optional: Cluster name specified by users in Helm configuration.
  // For self-managed clusters, this can be set via Helm configuration.
  // The Helm configuration takes precedence over the node labels.
  optional string cluster_name = 5;
}

// Network flow collection mechanism configured in the operator.
enum FlowCollector {
  // Default value. This value is unused and should not be set.
  FLOW_COLLECTOR_UNSPECIFIED = 0;
  // Indicates that no suitable network flow collection mechanism is available in the k8s cluster.
  FLOW_COLLECTOR_DISABLED = 1;
  // Indicates that the Cilium CNI plugin is deployed with Hubble Relay and is used for collecting network flows.
  FLOW_COLLECTOR_CILIUM = 2;
  // Indicates that Falco is deployed and configured for collecting network flows.
  FLOW_COLLECTOR_FALCO = 3;
  // Indicates that OVN-Kubernetes is deployed and configured for collecting network flows.
  FLOW_COLLECTOR_OVNK = 4;
  // Indicates that AWS VPC CNI is deployed with Network Policy Agent for collecting network flows.
  FLOW_COLLECTOR_VPC_CNI = 5;
}

// Message sent by the operator in a KubernetesResources request stream.
// Message subtypes are sent in this order in each stream:
// 1. (1) cluster_metadata, to identify the client cluster and operator.
// 2. (0+) resource_metadata, one message for each resource in the cluster.
// 3. (1) resource_snapshot_complete, to indicate the initial snapshot of all resources in the cluster is complete.
// 4. (0+) resource_mutation, one message for each resource creation/update/deletion in the cluster.
message SendKubernetesResourcesRequest {
  // Send any of these "request" messages that can contain any of the documented types.
  oneof request {
    Keepalive keepalive = 5;

    // Metadata about the cluster and operator.
    KubernetesClusterMetadata cluster_metadata = 1;
    // Metadata about a Kubernetes resource in the cluster.
    KubernetesObjectData resource_data = 2;
    // Indicates that all resource_metadata have been sent to report all the resources in the cluster in the initial snapshot.
    KubernetesResourceSnapshotComplete resource_snapshot_complete = 3;
    // A mutation to a Kubernetes resource in the cluster.
    KubernetesResourceMutation kubernetes_resource_mutation = 4;
  }
}

// Empty on purpose since this type is just expected when snapshot stream is done.
message KubernetesResourceSnapshotComplete {}

// Message sent to the operator in a KubernetesResources response stream.
message SendKubernetesResourcesResponse {
  // oneof response {
  //   // Until we are writing policies we shouldnt worry about what is returned here
  //   KubernetesAck ack = 1;
  // }
}

// A mutation to a Kubernetes resource in the cluster.
// Each mutation contains the full resource metadata after mutation (on create or update)
// or before mutation (on delete).
message KubernetesResourceMutation {
  // Send any of these "mutation" messages that can contain any of
  // The documented types
  oneof mutation {
    // Metadata of a newly created Kubernetes resource.
    KubernetesObjectData create_resource = 1;
    // Metadata of an updated Kubernetes resource, after update.
    KubernetesObjectData update_resource = 2;
    // Metadata of a deleted Kubernetes resource, before deletion.
    KubernetesObjectData delete_resource = 3;
  }
}

// A flow with a simple 5-tuple flow key received from a CNI plugin
message FiveTupleFlow {
  // layer3 IP layer, source, destination and ip_version
  IP layer3 = 1;
  // Proto contains protocol used
  Layer4 layer4 = 2;

  oneof ts {
    // time contains the unparsed timestamp string received from a CNI plugin; parse it and set timestamp instead
    string time = 3 [deprecated = true];
    google.protobuf.Timestamp timestamp = 4;
  }
}

// A flow received from Cilium Hubble Relay using the Observer service's GetFlows RPC.
// https://github.com/cilium/cilium/blob/main/api/v1/observer/observer.proto
message CiliumFlow {
  // Time when flow occurred.
  google.protobuf.Timestamp time = 1;
  // node_name is the name of the node from which this Flow was captured.
  string node_name = 2;
  // traffic_direction distinguishes direction of the connection, e.g. ingress or egress.
  TrafficDirection traffic_direction = 3;
  // verdict of the flow, indicating the outcome of the network packet processing.
  Verdict verdict = 4;
  // layer3 IP layer, source, destination and ip_version
  IP layer3 = 5;
  // layer4 contains protocol used
  Layer4 layer4 = 6;
  // is_reply indicates that this was a packet (L4) or message (L7) in the
  // reply direction. May be absent (in which case it is unknown whether it
  // is a reply or not).
  google.protobuf.BoolValue is_reply = 7;
  // endpoint of source ip with metadata
  optional Endpoint source_endpoint = 8;
  // endpoint of destination ip with metadata
  optional Endpoint destination_endpoint = 9;
  // destination_service contains the service name of the destination
  Service destination_service = 10;
  // The CiliumNetworkPolicies allowing the egress of the flow.
  repeated Policy egress_allowed_by = 11;
  // The CiliumNetworkPolicies allowing the ingress of the flow.
  repeated Policy ingress_allowed_by = 12;
  // The CiliumNetworkPolicies denying the egress of the flow.
  repeated Policy egress_denied_by = 13;
  // The CiliumNetworkPolicies denying the ingress of the flow.
  repeated Policy ingress_denied_by = 14;
}

// Service contains Service header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#Service
message Service {
  string name = 1;
  string namespace = 2;
}

// TrafficDirection contains TrafficDirectopm header flags of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-trafficdirection
enum TrafficDirection {
  TRAFFIC_DIRECTION_TRAFFIC_DIRECTION_UNKNOWN_UNSPECIFIED = 0;
  TRAFFIC_DIRECTION_INGRESS = 1;
  TRAFFIC_DIRECTION_EGRESS = 2;
}

// Verdict contains Verdict header flags of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-verdict
enum Verdict {
  VERDICT_UNKNOWN_UNSPECIFIED = 0;
  VERDICT_FORWARDED = 1;
  VERDICT_DROPPED = 2;
  VERDICT_ERROR = 3;
  VERDICT_AUDIT = 4;
  VERDICT_REDIRECTED = 5;
  VERDICT_TRACED = 6;
  VERDICT_TRANSLATED = 7;
}

// IP contains the IP header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-ip
message IP {
  string source = 1;
  string destination = 2;
  IPVersion ip_version = 3;
}

// IPVersion contains the IPVersion header flags of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-ipversion
enum IPVersion {
  IP_VERSION_IP_NOT_USED_UNSPECIFIED = 0;
  IP_VERSION_IPV4 = 1;
  IP_VERSION_IPV6 = 2;
}

// Layer4 contains the Layer-4 header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-layer4
message Layer4 {
  oneof protocol {
    TCP tcp = 1;
    UDP udp = 2;
    // ICMP is technically not L4, but mutually exclusive with the above.
    ICMPv4 icmpv4 = 3;
    ICMPv6 icmpv6 = 4;
    SCTP sctp = 5;
  }
}

// TCP contains the TCP header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-tcp
message TCP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
  TCPFlags flags = 3;
}

// TCPFlags is the mask of TCP header flags observed in TCP packets in a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-tcpflags
message TCPFlags {
  bool fin = 1;
  bool syn = 2;
  bool rst = 3;
  bool psh = 4;
  bool ack = 5;
  bool urg = 6;
  bool ece = 7;
  bool cwr = 8;
  bool ns = 9;
}

// UDP contains the UDP header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-udp
message UDP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}

// SCTP contains the SCTP header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-sctp
message SCTP {
  uint32 source_port = 1;
  uint32 destination_port = 2;
}

// ICMPv4 contains the ICMPv4 header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-icmpv4
message ICMPv4 {
  uint32 type = 1;
  uint32 code = 2;
}

// ICMPv6 contains the ICMPv6 header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-icmpv6
message ICMPv6 {
  uint32 type = 1;
  uint32 code = 2;
}

// Endpoint contains the Endpoint header fields of a flow
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-endpoint
message Endpoint {
  uint32 uid = 1;
  string cluster_name = 7;
  string namespace = 3;
  repeated string labels = 4;
  string pod_name = 5;
  repeated Workload workloads = 6;
}

// Workload contains the Workload header fields of a flow
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-workload
message Workload {
  string name = 1;
  string kind = 2;
}

// Policy contains the Policy header fields of a flow.
// https://pkg.go.dev/github.com/cilium/cilium/api/v1/flow#readme-policy
message Policy {
  string name = 1;
  string namespace = 2;
  repeated string labels = 3;
  uint64 revision = 4;
  string kind = 5;
}

// Flow exported by the CNI plugin in the cluster.
message SendKubernetesNetworkFlowsRequest {
  oneof request {
    Keepalive keepalive = 3;

    CiliumFlow cilium_flow = 1;
    FiveTupleFlow five_tuple_flow = 2;
  }
}

// Message sent to the operator in a SendKubernetesNetworkFlows response stream.
message SendKubernetesNetworkFlowsResponse {}

// Enumeration to define the different levels of logging.
enum LogLevel {
  // Default unspecified log level.
  LOG_LEVEL_UNSPECIFIED = 0;
  // Debug log level, useful for development and troubleshooting.
  LOG_LEVEL_DEBUG = 1;
  // Informational log level for general application information.
  LOG_LEVEL_INFO = 2;
  // Warning log level for potentially problematic situations.
  LOG_LEVEL_WARN = 3;
  // Error log level indicating something went wrong.
  LOG_LEVEL_ERROR = 4;
}

// Message representing a log entry.
message LogEntry {
  // The actual log message contents, as a JSON object.
  string json_message = 3;
}

// Message to encapsulate a request to send logs.
message SendLogsRequest {
  oneof request {
    Keepalive keepalive = 2;

    // A single log entry to be sent.
    LogEntry log_entry = 1;
  }
}

// Message to encapsulate the response for sending logs.
message SendLogsResponse {}

// Message to encapsulate a request to send configuration updates.
message GetConfigurationUpdatesRequest {
  oneof request {
    Keepalive keepalive = 1;
  }
}

// Message sent by the server in a GetConfigurationUpdates response stream.
// The stream carries two independent message sequences that may be interleaved:
//
// Log level configuration:
//   (0+) update_configuration, sent whenever the log level changes.
//
// Configured Kubernetes objects:
//   1. (0+) resource_data, one message for each object in the initial snapshot.
//   2. (1) resource_snapshot_complete, indicates the initial snapshot is complete.
//   3. (0+) resource_mutation, one message for each object create/update/delete.
//
// On stream reconnection, the server sends a new full snapshot of configured objects.
message GetConfigurationUpdatesResponse {
  message Configuration {
    // The operator's log level.
    LogLevel log_level = 1;
  }

  oneof response {
    Configuration update_configuration = 1;
    // Data about a Kubernetes object to configure in the cluster.
    ConfiguredKubernetesObjectData resource_data = 2;
    // Indicates that all resource_data have been sent to report all the objects in the cluster in the initial snapshot.
    ConfiguredKubernetesObjectSnapshotComplete resource_snapshot_complete = 3;
    // A mutation to a Kubernetes object in the cluster.
    ConfiguredKubernetesObjectMutation resource_mutation = 4;
  }
}

// Configured object data for snapshot or create/update operations.
message ConfiguredKubernetesObjectData {
  // Unique identifier for tracking this object.
  string id = 1;
  // Kubernetes annotations to apply to this object.
  map<string, string> annotations = 2;
  // Kubernetes labels to apply to this object.
  map<string, string> labels = 3;
  // Kubernetes resource name for the object.
  string name = 4;
  // Kubernetes namespace for the object. Empty for clusterwide resources.
  optional string namespace = 5;
  // Type-specific data for the Kubernetes resource kind.
  oneof kind_specific {
    KubernetesCiliumNetworkPolicyData cilium_network_policy = 100;
    KubernetesCiliumClusterwideNetworkPolicyData cilium_clusterwide_network_policy = 101;
    KubernetesCiliumCIDRGroupData cilium_cidr_group = 102;
  }
}

// Configured Kubernetes object reference for delete operations.
// Only the ID is needed because the full ConfiguredKubernetesObjectData is stored in memory,
// which contains all fields required to delete from the cluster.
message DeleteConfiguredKubernetesObject {
  // Unique identifier for tracking this object.
  string id = 1;
}

// Empty on purpose since this type is just expected when configured object snapshot is done.
message ConfiguredKubernetesObjectSnapshotComplete {}

// A configured Kubernetes object mutation to apply in the cluster.
message ConfiguredKubernetesObjectMutation {
  oneof mutation {
    // A new configured object to create in the cluster.
    ConfiguredKubernetesObjectData create_object = 1;
    // An existing configured object to update in the cluster.
    ConfiguredKubernetesObjectData update_object = 2;
    // An existing configured object to delete from the cluster.
    DeleteConfiguredKubernetesObject delete_object = 3;
  }
}

// Syncs the inventory of the Kubernetes resources in the cluster into CloudSecure.
service KubernetesInfoService {
  // Continuously syncs the inventory of the Kubernetes resources in the cluster into CloudSecure.
  rpc SendKubernetesResources(stream SendKubernetesResourcesRequest) returns (stream SendKubernetesResourcesResponse);
  // Continuously sends network flows exported by the CNI plugin in the cluster to CloudSecure.
  rpc SendKubernetesNetworkFlows(stream SendKubernetesNetworkFlowsRequest) returns (stream SendKubernetesNetworkFlowsResponse);
  // Continuously syncs logs from operator and cluster.
  rpc SendLogs(stream SendLogsRequest) returns (stream SendLogsResponse);
  // Continuously receives configuration updates from CloudSecure.
  rpc GetConfigurationUpdates(stream GetConfigurationUpdatesRequest) returns (stream GetConfigurationUpdatesResponse);
}
