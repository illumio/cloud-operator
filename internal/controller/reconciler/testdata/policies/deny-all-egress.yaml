# Deny all egress from pods with role=restricted.
# An empty egress rule ([{}]) means "match all egress but allow nothing specific",
# which combined with enableDefaultDeny effectively blocks all outbound traffic.
# https://docs.cilium.io/en/latest/security/policy/language/#deny-policies
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-all-egress
spec:
  endpointSelector:
    matchLabels:
      role: restricted
  egress:
    - {}
