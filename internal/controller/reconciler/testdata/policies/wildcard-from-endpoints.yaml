# Allow ingress to kube-dns from all Cilium managed endpoints on port 53/UDP.
# An empty matchLabels in fromEndpoints ({}) means "all managed endpoints" (wildcard).
# https://docs.cilium.io/en/latest/security/policy/language/#endpoints-based
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: wildcard-from-endpoints
spec:
  description: "Allow ingress to kube-dns from all Cilium managed endpoints"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: kube-system
      k8s-app: kube-dns
  ingress:
    - fromEndpoints:
        - {}
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
