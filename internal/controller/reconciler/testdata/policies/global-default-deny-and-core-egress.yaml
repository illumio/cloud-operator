# Zero-trust egress: allow only DNS to kube-dns and access to kube-apiserver.
# Empty endpointSelector ({}) targets all pods cluster-wide.
# https://docs.cilium.io/en/latest/security/policy/language/#dns-based
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: global-default-deny-and-core-egress
spec:
  description: "Enforce zero-trust egress cluster-wide while maintaining core DNS and API access."
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    - toEntities:
        - kube-apiserver
