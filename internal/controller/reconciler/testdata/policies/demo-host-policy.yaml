# Host firewall: allow cluster traffic, SSH on port 22, and ICMP echo requests.
# Copied from Cilium host firewall documentation:
# https://docs.cilium.io/en/latest/security/host-firewall/
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: demo-host-policy
spec:
  nodeSelector:
    matchLabels:
      node-access: ssh
  ingress:
  - fromEntities:
    - cluster
  - toPorts:
    - ports:
      - port: "22"
        protocol: TCP
  - icmps:
    - fields:
      - type: 8
        family: IPv4
      - type: EchoRequest
        family: IPv4
