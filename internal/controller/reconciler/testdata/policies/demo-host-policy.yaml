# From: https://github.com/cilium/cilium/blob/main/examples/policies/host/demo-host-policy.yaml
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: demo-host-policy
spec:
  description: ""
  nodeSelector:
    matchLabels:
      node-access: ssh
  ingress:
    - fromEntities:
        - cluster
    - toPorts:
        - ports:
            - port: "22"
              protocol: TCP
    - icmps:
        - fields:
            - type: EchoRequest
              family: IPv4
