# Rich policy: ingress from frontend on ports 80/443 TCP, deny all egress.
# Tests description, endpointSelector, enableDefaultDeny, ingress with ports, and empty egress.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: e2e-spec-verify
spec:
  description: "Allow HTTP ingress from frontend, deny all egress"
  endpointSelector:
    matchLabels:
      app: backend
  enableDefaultDeny:
    ingress: true
    egress: true
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
  egress:
    - {}
