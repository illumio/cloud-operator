suite: test clustercreds-secret values
templates:
  - clustercreds-secret.yaml
tests:
  - it: should set the correct environment variables
    asserts:
      - equal:
          path: data.client_id
          value: ""
      - equal:
          path: data.client_secret
          value: ""

  - it: should not create secret when disableSecretCreation is true
    set:
      clusterCredsSecret:
        disableSecretCreation: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should create secret with provided credentials
    set:
      clusterCredsSecret:
        clientId: "my-client-id"
        clientSecret: "my-client-secret"
        forceSecretCreation: true
    asserts:
      - equal:
          path: data.client_id
          value: "bXktY2xpZW50LWlk"
      - equal:
          path: data.client_secret
          value: "bXktY2xpZW50LXNlY3JldA=="
