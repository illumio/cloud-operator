# The cloud-operator container runs as a fixed non-root UID (65532), which falls
# outside the UID range allowed by OpenShift's default "restricted" SCC. Binding
# the service account to the "anyuid" SCC ClusterRole lets the pod run as that
# UID. This replaces the manual step of running
# `oc adm policy add-scc-to-user anyuid -z <sa> -n <namespace>`.
#
# Only rendered on OpenShift (where the SCC API exists), so the chart still
# installs cleanly on non-OpenShift clusters that lack security.openshift.io.
{{- if and .Values.openshift.createAnyuidSccRoleBinding (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshift-scc-anyuid
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloud-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
{{- end }}